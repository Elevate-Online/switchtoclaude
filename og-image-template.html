<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OG Image Template - Switch to Claude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f0f0;
      padding: 20px;
    }

    .og-container {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #1a1d21 0%, #212529 100%);
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .content {
      padding: 80px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .headline {
      font-size: 72px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.1;
      margin-bottom: 30px;
      letter-spacing: -0.02em;
    }

    .highlight {
      color: #D97757;
    }

    .subheadline {
      font-size: 32px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.4;
      max-width: 900px;
    }

    .footer {
      position: absolute;
      bottom: 60px;
      left: 80px;
      right: 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .domain {
      font-size: 28px;
      font-weight: 600;
      color: #D97757;
    }

    .badge {
      background: rgba(217, 119, 87, 0.15);
      border: 2px solid #D97757;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: 600;
      color: #D97757;
    }

    /* Decorative elements */
    .decoration {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(217, 119, 87, 0.15) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="og-container">
    <div class="decoration"></div>
    <div class="content">
      <div class="headline">
        Switch from ChatGPT to<br>
        <span class="highlight">Claude</span> — Without<br>
        Starting Over
      </div>
      <div class="subheadline">
        Free migration guide with exact prompts to preserve<br>
        everything ChatGPT knows about you.
      </div>
    </div>
    <div class="footer">
      <div class="domain">switchtoclaude.com</div>
      <div class="badge">Free Guide</div>
    </div>
  </div>

  <script>
    // Instructions for taking screenshot
    console.log(`
%c📸 Screenshot Instructions:

1. Open Browser DevTools (F12 or Cmd+Option+I)
2. Toggle device toolbar (Cmd+Shift+M or Ctrl+Shift+M)
3. Set dimensions to exactly: 1200 x 630
4. Take screenshot of the og-container element
5. Save as: og-image.png
6. Move to: public/og-image.png

Alternatively, use a browser extension or screenshot tool
to capture at exactly 1200x630px.
    `, 'color: #D97757; font-size: 14px; font-weight: bold;');
  </script>
</body>
</html>
